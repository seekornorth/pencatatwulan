<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catatan Keuangan</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h1>Catatan Keuangan</h1>

    <div class="summary">
      <div class="card">
        <h3>Pemasukan</h3>
        <p id="totalMasuk">Rp 0</p>
      </div>

      <div class="card">
        <h3>Pengeluaran</h3>
        <p id="totalKeluar">Rp 0</p>
      </div>

      <div class="card">
        <h3>Saldo</h3>
        <p id="saldo">Rp 0</p>
      </div>
    </div>

    <form id="formTransaksi">

      <input type="date" id="tanggal" required>

      <select id="jenis" required>
        <option value="Masuk">Pemasukan</option>
        <option value="Keluar">Pengeluaran</option>
      </select>

      <input
        type="text"
        id="kategori"
        placeholder="Kategori"
        required
      >

      <input
        type="number"
        id="nominal"
        placeholder="Nominal"
        required
      >

      <input
        type="text"
        id="catatan"
        placeholder="Catatan"
      >

      <button type="submit">
        Simpan
      </button>

    </form>

    <table>

      <thead>
        <tr>
          <th>Tanggal</th>
          <th>Jenis</th>
          <th>Kategori</th>
          <th>Nominal</th>
          <th>Catatan</th>
        </tr>
      </thead>

      <tbody id="tbody"></tbody>

    </table>

  </div>

  <script src="app.js"></script>

</body>
</html>
