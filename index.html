<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Pencatat Uang Wulan 🌸</title>

  <link rel="stylesheet" href="style.css" />

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

  <div class="container">

    <!-- HEADER -->
    <header class="header">
      <div>
        <h1>🌸 Pencatat Uang Wulan</h1>
        <p class="subtitle">
          Catat pemasukan dan pengeluaran harian
        </p>
      </div>
    </header>

    <!-- DASHBOARD -->
    <section class="balance-card">
      <span>Saldo Saat Ini</span>
      <h2 id="saldo">Rp 0</h2>
    </section>

    <section class="stats">

      <div class="card income">
        <span>Pemasukan</span>
        <h3 id="totalMasuk">Rp 0</h3>
      </div>

      <div class="card expense">
        <span>Pengeluaran</span>
        <h3 id="totalKeluar">Rp 0</h3>
      </div>

    </section>

    <!-- CHART -->
    <section class="card chart-card">
      <h3>Ringkasan Keuangan</h3>

      <canvas id="moneyChart"></canvas>
    </section>

    <!-- FILTER TAB -->
    <section class="tabs">

      <button
        class="tab active"
        data-filter="all"
      >
        Semua
      </button>

      <button
        class="tab"
        data-filter="Masuk"
      >
        Pemasukan
      </button>

      <button
        class="tab"
        data-filter="Keluar"
      >
        Pengeluaran
      </button>

    </section>

    <!-- TRANSACTION LIST -->
    <section class="transaction-section">

      <h3>Riwayat Transaksi</h3>

      <div id="transactionList">

      </div>

    </section>

  </div>

  <!-- FLOATING BUTTON -->
  <button id="fab">
    +
  </button>

  <!-- MODAL -->
  <div id="modal" class="modal">

    <div class="modal-content">

      <div class="modal-header">
        <h3>Tambah Transaksi</h3>

        <button id="closeModal">
          ✕
        </button>
      </div>

      <form id="formTransaksi">

        <input
          type="date"
          id="tanggal"
          required
        />

        <select
          id="jenis"
          required
        >
          <option value="Masuk">
            Pemasukan
          </option>

          <option value="Keluar">
            Pengeluaran
          </option>
        </select>

        <select
          id="kategori"
          required
        >
          <option value="Makan">
            🍜 Makan
          </option>

          <option value="Belanja">
            🛍️ Belanja
          </option>

          <option value="Transport">
            🚗 Transport
          </option>

          <option value="Tagihan">
            🧾 Tagihan
          </option>

          <option value="Kesehatan">
            💊 Kesehatan
          </option>

          <option value="Hiburan">
            🎮 Hiburan
          </option>

          <option value="Lainnya">
            📦 Lainnya
          </option>
        </select>

        <input
          type="number"
          id="nominal"
          placeholder="Nominal"
          required
        />

        <textarea
          id="catatan"
          placeholder="Catatan..."
          rows="3"
        ></textarea>

        <button
          type="submit"
          class="save-btn"
        >
          Simpan Transaksi
        </button>

      </form>

    </div>

  </div>

  <script src="app.js"></script>

</body>
</html>
